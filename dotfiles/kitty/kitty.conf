# Themes
include themes/gruvbox_darkhard.conf
#
# Allow applications to control colors
allow_remote_control no

# Don't force your own cursor colors (optional)
cursor_text_color background

# advance 
term xterm-kitty

# terminal bell
enable_audio_bell no

# Font
font_family Fira Code
bold_font          auto
italic_font        auto
bold_italic_font   auto
font_size 12.0

# Cursor
cursor_shape block
cursor_blink_interval 0
shell_integration no-cursor

# Close confirmation
confirm_os_window_close 0
#
# scrollback
scrollback_lines 5000
wheel_scroll_multiplier 3.0

# mouse
mouse_hide_wait -1
