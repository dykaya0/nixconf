# Plugins

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# Colors
backgroundColor="#101010"
backgroundAltColor="#202020"
overlayColor="#272727"
textColor="#ffffff"
highlightColor="#458ee6"
contrastColor="#f54d27"
# Options

set -g default-terminal "${TERM}"
set -sg terminal-overrides ",*:RGB"

set-option -g renumber-windows on
set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set -g xterm-keys on
set-window-option -g mode-keys vi

# Unbind default split keys
unbind '"'
unbind %
unbind -n C-Left
unbind -n C-Right
unbind -n C-Up
unbind -n C-Down

# Keybindings

unbind C-b
set -g prefix C-a
bind C-a send-prefix

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

bind s split-window -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind t new-window -c "#{pane_current_path}"

bind-key c confirm-before -p "Kill window '#W'? (y/n)" kill-window
bind-key x kill-pane
bind w choose-tree -s -w

bind -n M-h previous-window
bind -n M-l next-window

## tmux-sessionizer
bind Tab display-popup -E -w 40% -h 80% "tms"

# Theme
set-option -g status-position top
set -g status-justify absolute-centre
set -g status-interval 1

## Pane background color (inactive + active panes)
set -g window-style "bg=${backgroundAltColor}"
set -g window-active-style "bg=${backgroundColor}"

set -g status-style "fg=${textColor},bg=${overlayColor}"
set -g message-style "fg=${textColor},bg=${contrastColor}"
set -g mode-style "fg=${overlayColor},bg=${textColor}"

set -g status-left "#[fg=#{?client_prefix,${overlayColor},${textColor}},bg=#{?client_prefix,${highlightColor},${overlayColor}},bold] #S"
set -g status-left-length 100
set -g status-right "#[fg=${textColor}] #(tomato -t)"
set -g status-right-length 100

set -g window-status-format "#[fg=${textColor},bg=${overlayColor}]  #I #W"
set -g window-status-current-format "#[fg=#{?window_zoomed_flag,${contrastColor},${highlightColor}},bg=${overlayColor}]  #I #W"

set -g pane-border-style "fg=${highlightColor},bg=${backgroundAltColor}"
set -g pane-active-border-style "fg=${highlightColor},bg=${backgroundColor}"
